services:
  neo4j:
    image: ${NEO4J_IMAGE:-esendashnyam/ale-neo4j:latest}
    container_name: ale-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ale-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ale_db}
      POSTGRES_USER: ${POSTGRES_USER:-ale_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ale_pass}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ale_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:
